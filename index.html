<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="./style.css" />
    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <title>Frontend Mentor | Profile card component</title>
  </head>
  <body>
    <div id="container">
      <div class="profile-circle-top"></div>
      <div class="profile-circle-bottom"></div>
      <div id="profile-card">
        <a href="/" class="profile-bg">Pattern </a>
        <img
          src="./images/image-victor.jpg"
          alt="Victor image"
          class="profile-img"
        />
        <section>
          <p class="profile-name"><strong>Victor Crest</strong> 26</p>
          <p class="profile-location">London</p>
        </section>
        <p class="profile-details">
          80K &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
          803K&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; 1.4K
        </p>

        <p class="profile-details-2">
          Followers&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
          Likes&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Photos
        </p>
      </div>
      <div class="attribution">
        Challenge by
        <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
          >Frontend Mentor</a
        >. Coded by <a href="#">Santosh Jain</a>.
      </div>
    </div>
  </body>
</html>
